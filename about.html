<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>关于作者 — 努努梦工厂</title>
<link rel="icon" type="image/png" href="images/logo.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

:root {
  --pink:        #E8A8B8;
  --pink-light:  #F8D0DC;
  --blue:        #A8C4E8;
  --blue-light:  #D0DCF4;
  --mint:        #A8D8C0;
  --lavender:    #C8B8E0;
  --border:      #E8D8E8;
  --text:        #5A4A5E;
  --text-soft:   #908098;
  --text-muted:  #B8A8C0;
  --r-sm:   10px;
  --r-md:   16px;
  --r-pill: 50px;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --font: 'Noto Sans SC', 'M PLUS Rounded 1c', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  font-size: 15px;
  background:
    radial-gradient(ellipse 80% 60% at 20% 20%, rgba(248,208,220,0.22) 0%, transparent 55%),
    radial-gradient(ellipse 70% 50% at 80% 30%, rgba(208,220,244,0.20) 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 50% 80%, rgba(200,232,216,0.18) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 70% 70%, rgba(224,216,240,0.16) 0%, transparent 50%),
    linear-gradient(170deg, #FDF6F9 0%, #F8F4FA 25%, #F4F6FC 50%, #F6F4F8 75%, #FDF6F9 100%);
  background-attachment: fixed;
  color: var(--text);
  min-height: 100vh;
  letter-spacing: 0.2px;
}

/* ── Header ── */
header {
  height: 44px;
  background: rgba(255,255,255,0.70);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  border-bottom: 1px solid rgba(220,200,215,0.30);
  display: flex;
  align-items: center;
  padding: 0 22px;
  gap: 8px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.nav-brand {
  font-size: 15px;
  font-weight: 600;
  color: #6B5B6E;
  text-decoration: none;
  letter-spacing: 0.5px;
  margin-right: auto;
  transition: color 0.2s;
}
.nav-brand:hover { color: #D08090; }
.nav-link {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-soft);
  text-decoration: none;
  padding: 5px 14px;
  border-radius: var(--r-pill);
  transition: all 0.25s var(--ease);
  letter-spacing: 0.3px;
  white-space: nowrap;
  border: 1px solid transparent;
}
.nav-link:hover {
  color: var(--pink);
  background: rgba(232,168,184,0.08);
  border-color: rgba(232,168,184,0.25);
}
.nav-link.active {
  color: var(--pink);
  background: rgba(232,168,184,0.10);
  border-color: rgba(232,168,184,0.30);
  font-weight: 600;
}

/* ── Content ── */
main {
  max-width: 720px;
  margin: 0 auto;
  padding: 48px 24px 80px;
}

/* ── Hero Card ── */
.hero-card {
  text-align: center;
  margin-bottom: 40px;
}
.avatar {
  width: 140px; height: 140px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(232,168,184,0.20), rgba(168,196,232,0.20));
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
  font-size: 42px;
  padding: 3px;
  background-clip: content-box;
  border: 3px solid transparent;
  background-image: linear-gradient(#fff, #fff), linear-gradient(135deg, #E8A8B8, #C8A8E0, #A8C8E8, #E8A8B8);
  background-origin: border-box;
  background-clip: content-box, border-box;
  box-shadow: 0 0 28px rgba(232,168,184,0.2), 0 4px 16px rgba(180,160,200,0.12);
}
.hero-card .name {
  font-size: 22px;
  font-weight: 600;
  color: #6B5B6E;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
.hero-card .tagline {
  font-size: 14px;
  color: var(--text-muted);
  letter-spacing: 0.3px;
}

/* ── Info Card ── */
.info-card {
  background: rgba(255,255,255,0.72);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: var(--r-md);
  border: 1px solid rgba(220,200,215,0.25);
  padding: 28px;
  margin-bottom: 20px;
  box-shadow: 0 2px 12px rgba(180,160,190,0.08);
}
.info-card h3 {
  font-size: 16px;
  font-weight: 600;
  color: #C88898;
  margin-bottom: 12px;
  letter-spacing: 0.3px;
}
.info-card p {
  font-size: 14px;
  line-height: 1.85;
  color: var(--text-soft);
  letter-spacing: 0.1px;
}

/* ── Link List ── */
.link-list {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 8px;
}
.link-item {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 18px;
  border-radius: var(--r-pill);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-soft);
  text-decoration: none;
  border: 1px solid rgba(220,200,215,0.30);
  background: rgba(255,255,255,0.50);
  transition: all 0.25s var(--ease);
  letter-spacing: 0.2px;
}
.link-item:hover {
  color: var(--pink);
  border-color: rgba(232,168,184,0.40);
  background: rgba(232,168,184,0.06);
  box-shadow: 0 0 16px rgba(232,168,184,0.12);
}

/* ── Footer ── */
footer {
  text-align: center;
  padding: 24px;
  color: var(--text-muted);
  font-size: 12px;
  letter-spacing: 0.2px;
}

@media (max-width: 900px) {
  main { padding: 32px 16px 60px; }
  .hero-card .name { font-size: 19px; }
  .info-card { padding: 20px 18px; }
  .info-card h3 { font-size: 15px; }
  .info-card p { font-size: 13px; }
  .link-item { font-size: 12px; padding: 7px 14px; }
  header { padding: 0 10px; height: 42px; }
  .nav-brand { font-size: 13px; }
  .nav-link { font-size: 10px; padding: 3px 8px; }
}
</style>
</head>
<body>

<header>
  <a href="index.html" class="nav-brand">努努梦工厂</a>
  <nav class="header-nav">
    <a href="index.html" class="nav-link">DIY</a>
    <a href="about.html" class="nav-link active">关于作者</a>
  </nav>
</header>

<main>
  <div class="hero-card">
    <div class="avatar"><img src="images/tag.png?v=2" alt="头像" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"></div>
    <div class="name">文年年</div>
    <div class="tagline">不知道 大家说有鸡蛋领我就来了</div>
  </div>

  <div class="info-card">
    <h3>关于网页</h3>
    <p>作者做了一个梦，梦里是她的前世……睡醒后只记得结尾之时有一人立于山巅大笑。而作者只是山脚下的始发公交车到终点后再骑十分钟电驴直走拐弯再上楼最外面那一户里面在主卧睡大觉的人。综上所述，界面内容缓慢更新中…………</p>
    <p style="margin-top:10px;">希望大家都可以做出属于自己的小宝宝哦</p>
  </div>

  <div class="info-card">
    <h3>联系方式</h3>
    <p>如果你有任何问题和建议，欢迎通过以下方式联系作者</p>
    <div class="link-list">
      <span class="link-item">邮箱：wnn_1222@163.com</span>
      <span class="link-item">小红书：文年年</span>
    </div>
  </div>

  <div class="info-card">
    <h3>致谢</h3>
    <p>图纸模板来自于san-Ga老师 感谢感恩</p>
  </div>

  <div class="info-card">
    <h3>📋 更新日志</h3>
    <p style="margin-top:6px;">2026/06 - 上线</p>
  </div>
</main>

<footer>努努梦工厂</footer>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
